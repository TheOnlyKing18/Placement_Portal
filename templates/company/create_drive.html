{% extends "base.html" %}
{% block title %}Create Drive{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4"><h3 class="fw-bold mb-0">Create Placement Drive</h3><a href="{{ url_for('company_dashboard') }}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a></div>
<div class="pp-card"><div class="card-body p-4"><form method="POST"><div class="row g-3"><div class="col-12"><h6 class="pp-section-label">Drive Details</h6></div><div class="col-md-8"><label class="form-label pp-label">Drive Title *</label><input type="text" name="title" class="form-control" required></div><div class="col-md-4"><label class="form-label pp-label">Job Role *</label><input type="text" name="job_role" class="form-control" required></div><div class="col-md-4"><label class="form-label pp-label">Package</label><input type="text" name="package" class="form-control" placeholder="12 LPA"></div><div class="col-md-4"><label class="form-label pp-label">Location</label><input type="text" name="location" class="form-control"></div><div class="col-md-4"><label class="form-label pp-label">Min CGPA</label><input type="number" name="min_cgpa" class="form-control" step="0.1" min="0" max="10" value="0"></div><div class="col-12"><label class="form-label pp-label">Eligible Branches</label><input type="text" name="eligible_branch" class="form-control" placeholder="Computer Science, IT, ..."></div><div class="col-12"><label class="form-label pp-label">Description</label><textarea name="description" class="form-control" rows="4"></textarea></div><div class="col-12"><label class="form-label pp-label">Requirements</label><textarea name="requirements" class="form-control" rows="3"></textarea></div><div class="col-md-6"><label class="form-label pp-label">Drive Date</label><input type="date" name="drive_date" class="form-control"></div><div class="col-md-6"><label class="form-label pp-label">Last Date to Apply</label><input type="date" name="last_date_apply" class="form-control"></div><div class="col-12 mt-2"><button type="submit" class="btn pp-btn-primary px-5"><i class="bi bi-megaphone me-2"></i>Submit Drive</button></div></div></form></div></div>
{% endblock %}
